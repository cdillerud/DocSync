name: Patch prepayment layout

on:
  push:
    branches:
      - feature/simple-zetadocs-replacement
    paths:
      - tools/patch_prepayment_layout.py
      - .github/workflows/patch-prepayment-layout.yml

permissions:
  contents: write

jobs:
  patch-layout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feature/simple-zetadocs-replacement
          fetch-depth: 0

      - name: Patch RDLC layout
        run: python tools/patch_prepayment_layout.py

      - name: Commit patched layout
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No layout changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bc-extension/zetadocs-replacement/src/reportlayout/GPIPrepaymentNotice.rdl
          git commit -m "Refine prepayment notice layout parity [skip ci]"
          git push origin HEAD:feature/simple-zetadocs-replacement
