name: Sales Order Automation Tests

on:
  pull_request:
    paths:
      - "backend/services/sales_order_*.py"
      - "backend/routes/sales_order_review.py"
      - "backend/routes/__init__.py"
      - "backend/scripts/*sales_order*.py"
      - "backend/tests/test_sales_order_*.py"
      - "backend/setup.cfg"
      - "frontend/src/pages/SalesOrderReviewPage.js"
      - "frontend/src/App.js"
      - "frontend/src/components/AppLayout.js"
      - "docker-compose.sales-order-test.yml"
      - ".github/workflows/sales-order-tests.yml"
  push:
    branches:
      - feature/sales-order-intake-preflight
    paths:
      - "backend/services/sales_order_*.py"
      - "backend/routes/sales_order_review.py"
      - "backend/routes/__init__.py"
      - "backend/scripts/*sales_order*.py"
      - "backend/tests/test_sales_order_*.py"
      - "backend/setup.cfg"
      - "frontend/src/pages/SalesOrderReviewPage.js"
      - "frontend/src/App.js"
      - "frontend/src/components/AppLayout.js"
      - "docker-compose.sales-order-test.yml"
      - ".github/workflows/sales-order-tests.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      AUTO_CREATE_SALES_ORDER_ENABLED: "false"
      SALES_ORDER_ALLOW_PO_PRICE_OVERRIDE: "false"
      BC_MOCK_MODE: "true"
      DEMO_MODE: "true"
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: gpi_sales_order_ci

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: >-
          python -m pip install
          --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          -r requirements.txt

      - name: Run sales-order tests
        run: pytest -q tests/test_sales_order_*.py

      - name: Compile sales-order modules
        run: |
          python -m py_compile \
            services/sales_order_preflight.py \
            services/sales_order_runtime.py \
            services/sales_order_bc_lookup.py \
            services/sales_order_bc_writer.py \
            services/sales_order_review_service.py \
            services/auto_post_service.py \
            routes/sales_order_review.py \
            scripts/seed_sales_order_test_data.py \
            scripts/smoke_sales_order_review.py

      - name: Lint sales-order implementation
        run: |
          flake8 \
            services/sales_order_preflight.py \
            services/sales_order_runtime.py \
            services/sales_order_bc_lookup.py \
            services/sales_order_bc_writer.py \
            services/sales_order_review_service.py \
            services/auto_post_service.py \
            routes/sales_order_review.py \
            routes/__init__.py \
            scripts/seed_sales_order_test_data.py \
            scripts/smoke_sales_order_review.py \
            tests/test_sales_order_*.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "false"
      REACT_APP_BACKEND_URL: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build sales-order review UI
        run: yarn build
