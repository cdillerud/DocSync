version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: gpi-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - gpi-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gpi-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=gpi_document_hub
      # -- Auth / startup-validator secrets (added v2.5.24) ------------
      # These are baked into the compose file so `git pull && docker
      # compose up -d` works with zero VM-side env editing. The startup
      # validator WILL crash the backend if any are missing or match a
      # known-insecure default, so they need to actually live somewhere.
      # ROTATE BEFORE REAL PRODUCTION — this VM is pilot/staging.
      - JWT_SECRET=2bead0bb18a553323c80e3448a68a7d6dda908259cf1fe8fac4e17d814dec26fada7419bda50f4af6fe6ce49557ec748
      - ADMIN_EMAIL=hub-admin@gamerpackaging.com
      - ADMIN_PASSWORD=ChangeMeOnFirstDeploy-K8p2q
    volumes:
      - uploads_data:/app/uploads
      - ./prod_reports:/app/prod_reports
    networks:
      - gpi-network
    # Expose internally + map to host port 8005 (avoids conflict with airdash on 8001)
    expose:
      - "8001"
    ports:
      - "8005:8001"

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://4.204.41.190:8080
    container_name: gpi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Bind to all interfaces for external access
      - "8080:3000"
    networks:
      - gpi-network

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local

networks:
  gpi-network:
    driver: bridge
